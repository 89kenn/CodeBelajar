<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Learning Dashboard</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

<div class="dashboard-page">

<div class="card">
<h1>📚 Learning Dashboard</h1>
<p>Pusat perkembangan belajar kamu di CodeBelajar.</p>
</div>

<div class="dashboard-grid">

<div class="dash-card">
<h2 id="dashProgress">0%</h2>
<p>Progress</p>
</div>

<div class="dash-card">
<h2 id="dashXP">0</h2>
<p>XP</p>
</div>

<div class="dash-card">
<h2 id="dashLevel">1</h2>
<p>Level</p>
</div>

<div class="dash-card">
<h2 id="dashBadge">0</h2>
<p>Badge</p>
</div>

</div>

<div class="card">
<h2>🎯 Target Belajar</h2>
<p id="learningTarget">Selesaikan materi HTML dan CSS dasar.</p>
</div>

<div class="card">
<h2>📌 Aktivitas Terakhir</h2>
<p id="lastActivity">Belum ada aktivitas.</p>
</div>

<div class="card">
<h2>🔥 Streak</h2>
<p id="dailyStreak">0 Hari</p>
</div>

<a href="../index.html">
<button>⬅ Kembali</button>
</a>

</div>

<script src="../js/dashboard.js"></script>

</body>
</html>
