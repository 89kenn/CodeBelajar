<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="card">
<h1>⚙️ Settings</h1>
<p>Atur aplikasi CodeBelajar.</p>
</div>

<div class="card">
<h2>🌙 Tema</h2>
<button id="toggleTheme">Dark / Light Mode</button>
</div>

<div class="card">
<h2>💾 Backup Data</h2>
<button id="backupData">📥 Download Backup</button>
</div>

<div class="card">
<h2>♻️ Restore Data</h2>
<input type="file" id="restoreFile" accept=".json">
<button id="restoreData">📤 Restore Backup</button>
</div>

<div class="card">
<h2>🗑️ Reset Semua Data</h2>
<button id="resetAll">Hapus Semua Data</button>
</div>

<a href="../index.html">
<button>⬅ Kembali</button>
</a>

<script src="../js/settings.js"></script>

</body>
</html>
