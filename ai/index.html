<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CodeAI</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/ai.css">

</head>

<body>

<div class="ai-container">

<div class="ai-header">

<img src="../assets/logo.png" class="ai-logo">

<div>

<h1>CodeAI</h1>

<p>Powered by Gemini AI</p>

</div>

</div>

<div id="chatBox" class="chat-box">

<div class="ai-message">

👋 Halo! Saya <b>CodeAI</b>. Saya siap membantu kamu belajar coding.

</div>

</div>

<div class="prompt-grid">

<button class="prompt-btn">
💻 Buat Website
</button>

<button class="prompt-btn">
🐍 Belajar Python
</button>

<button class="prompt-btn">
⚡ Perbaiki Error
</button>

<button class="prompt-btn">
📖 Jelaskan Kode
</button>

</div>

<div class="chat-input">

<textarea
id="userPrompt"
placeholder="Tanyakan sesuatu kepada CodeAI..."></textarea>

<button id="sendPrompt">

🚀 Kirim

</button>

</div>

<a href="../index.html">

<button>

⬅ Kembali

</button>

</a>

</div>

<script src="../js/ai.js"></script>

</body>
</html>
